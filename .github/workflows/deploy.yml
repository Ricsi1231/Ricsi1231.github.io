name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        # `enablement: true` turns on GitHub Pages and switches its build type to
        # "GitHub Actions" from within the workflow — so the default Jekyll builder
        # (which fails on Astro `---` frontmatter) is disabled without a manual UI toggle.
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build Astro site
        uses: withastro/action@v3
        # Defaults: Node 20, npm, path ".", build "npm run build", output "dist".

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
